# Rafraichit chaque nuit le bloc RESULTATS de index.html depuis la base de
# production (secret DATABASE_URL). Ne commit que s'il y a un changement.
name: update-results

on:
  schedule:
    - cron: "15 4 * * *"   # 04h15 UTC = 06h15 Paris, apres le bilan de minuit
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Sans le secret DATABASE_URL, on sort proprement (pas d'echec nocturne).
    # Le jour ou le secret est ajoute dans Settings > Secrets > Actions,
    # le rafraichissement demarre tout seul, rien d'autre a faire.
    steps:
      - name: Check secret
        id: gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Secret DATABASE_URL absent : rafraichissement desactive (aucune erreur)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.present == 'true'
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.present == 'true'
        with:
          python-version: "3.12"
      - name: Install psycopg2
        if: steps.gate.outputs.present == 'true'
        run: pip install psycopg2-binary
      - name: Regenerate results block
        if: steps.gate.outputs.present == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/update_results.py index.html
      - name: Commit and push if changed
        if: steps.gate.outputs.present == 'true'
        run: |
          git config user.name "gbet-results-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet index.html; then
            git add index.html
            git commit -m "Resultats du jour (auto)"
            git push
          else
            echo "Aucun changement"
          fi
